<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f0f2f5"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="64" fill="#001529"/>
  <text x="24" y="36" fill="white" font-size="20" font-family="system-ui, -apple-system">死信队列管理</text>
  
  <!-- Sidebar -->
  <rect x="0" y="64" width="208" height="736" fill="#002140"/>
  
  <!-- Main Content -->
  <rect x="208" y="64" width="992" height="736" fill="#f0f2f5"/>
  
  <!-- Content Card -->
  <rect x="232" y="88" width="944" height="688" fill="white" rx="4" stroke="#e8e8e8"/>
  
  <!-- Title + Buttons -->
  <text x="256" y="128" font-size="16" font-weight="600" font-family="system-ui, -apple-system">事件推送失败记录</text>
  <rect x="700" y="104" width="100" height="32" fill="#52c41a" rx="4"/>
  <text x="718" y="126" fill="white" font-size="14" font-family="system-ui, -apple-system">全部重发</text>
  <rect x="810" y="104" width="100" height="32" fill="#ff4d4f" rx="4"/>
  <text x="825" y="126" fill="white" font-size="14" font-family="system-ui, -apple-system">清空</text>
  
  <!-- Table Header -->
  <rect x="256" y="160" width="900" height="40" fill="#fafafa" rx="2"/>
  <text x="266" y="185" font-size="14" font-weight="600" font-family="system-ui, -apple-system">事件类型</text>
  <text x="380" y="185" font-size="14" font-weight="600" font-family="system-ui, -apple-system">订阅ID</text>
  <text x="500" y="185" font-size="14" font-weight="600" font-family="system-ui, -apple-system">重试次数</text>
  <text x="620" y="185" font-size="14" font-weight="600" font-family="system-ui, -apple-system">最后错误</text>
  <text x="760" y="185" font-size="14" font-weight="600" font-family="system-ui, -apple-system">创建时间</text>
  <text x="880" y="185" font-size="14" font-weight="600" font-family="system-ui, -apple-system">操作</text>
  
  <!-- Row 1 -->
  <rect x="256" y="208" width="900" height="48" fill="white" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="266" y="220" width="60" height="24" fill="#1890ff" rx="12"/>
  <text x="276" y="236" fill="white" font-size="12" font-family="system-ui, -apple-system">TASK</text>
  <text x="380" y="238" font-size="14" fill="#1890ff" font-family="system-ui, -apple-system">sub_123...</text>
  <text x="500" y="238" font-size="14" fill="#faad14" font-weight="bold" font-family="system-ui, -apple-system">3</text>
  <text x="620" y="238" font-size="14" font-family="system-ui, -apple-system">connect timeout...</text>
  <text x="760" y="238" font-size="14" font-family="system-ui, -apple-system">2小时前</text>
  <text x="885" y="238" font-size="14" fill="#1890ff" font-family="system-ui, -apple-system">重发 | 删除</text>
  
  <!-- Row 2 -->
  <rect x="256" y="256" width="900" height="48" fill="white" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="266" y="268" width="70" height="24" fill="#52c41a" rx="12"/>
  <text x="276" y="284" fill="white" font-size="12" font-family="system-ui, -apple-system">PROJECT</text>
  <text x="380" y="286" font-size="14" fill="#1890ff" font-family="system-ui, -apple-system">sub_456...</text>
  <text x="500" y="286" font-size="14" font-family="system-ui, -apple-system">1</text>
  <text x="620" y="286" font-size="14" font-family="system-ui, -apple-system">ssl certificate...</text>
  <text x="760" y="286" font-size="14" font-family="system-ui, -apple-system">5小时前</text>
  <text x="885" y="286" font-size="14" fill="#1890ff" font-family="system-ui, -apple-system">重发 | 删除</text>
  
  <!-- Pagination -->
  <text x="256" y="760" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">共 24 条，第 1 页</text>
  
  <!-- Footer -->
  <text x="256" y="790" font-size="12" fill="#8c8c8c" font-family="system-ui, -apple-system">
  设计：Tina · 迭代2 · 死信队列管理页面
  </text>
</svg>
