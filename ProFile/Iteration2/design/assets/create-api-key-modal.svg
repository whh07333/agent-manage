<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Modal overlay -->
  <rect width="800" height="500" fill="rgba(0,0,0,0.45)"/>
  
  <!-- Modal -->
  <rect x="100" y="80" width="600" height="340" fill="white" rx="8"/>
  
  <!-- Header -->
  <text x="120" y="115" font-size="18" font-weight="600" font-family="system-ui, -apple-system">新建 API 密钥</text>
  <text x="660" y="115" font-size="24" fill="#8c8c8c" font-family="system-ui, -apple-system">×</text>
  
  <!-- Content -->
  <text x="120" y="160" font-size="14" font-family="system-ui, -apple-system">过期时间</text>
  <rect x="120" y="170" width="360" height="40" fill="white" stroke="#d9d9d9" rx="4"/>
  <text x="130" y="196" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">90 天（默认）</text>
  <text x="550" y="196" fill="#8c8c8c" font-family="system-ui, -apple-system">▼</text>
  
  <!-- New Key Created -->
  <rect x="120" y="230" width="560" height="80" fill="#fffbe6" stroke="#faad14" rx="4"/>
  <text x="135" y="255" font-size="13" fill="#faad14" font-weight="bold" font-family="system-ui, -apple-system">⚠️ 密钥创建成功，请立即复制保存</text>
  <text x="135" y="280" font-size="14" font-family="system-ui, -apple-system">sk-agt-<tspan fill="#1890ff" font-weight="bold">a1B2c3D4e5F6g7H8...</tspan></text>
  <rect x="480" y="262" width="80" height="28" fill="#1890ff" rx="4"/>
  <text x="492" y="280" fill="white" font-size="12" font-family="system-ui, -apple-system">复制</text>
  
  <text x="120" y="335" font-size="12" fill="#faad14" font-family="system-ui, -apple-system">
  💡 提示：密钥只显示一次，关闭弹窗后无法再次查看完整密钥
  </text>
  
  <!-- Buttons -->
  <rect x="350" y="370" width="100" height="36" fill="transparent" stroke="#d9d9d9" rx="4"/>
  <text x="380" y="394" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">关闭</text>
  <rect x="465" y="370" width="100" height="36" fill="#1890ff" rx="4"/>
  <text x="480" y="394" fill="white" font-size="14" font-family="system-ui, -apple-system">创建</text>
  
  <!-- Footer -->
  <text x="100" y="470" font-size="11" fill="#8c8c8c" font-family="system-ui, -apple-system">
  设计：Tina · 迭代2 · API密钥新建弹窗 · 安全设计
  </text>
</svg>
