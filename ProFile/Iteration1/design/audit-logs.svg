  <rect x="140" y="75" width="120" height="30" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="150" y="94" font-family="Inter, Arial" font-size="12" fill="#64748b">全部</text>
  <text x="280" y="95" font-family="Inter, Arial" font-size="14" fill="#64748b">操作人: </text>
  <rect x="360" y="75" width="120" height="30" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="370" y="94" font-family="Inter, Arial" font-size="12" fill="#64748b">全部</text>
  <rect x="500" y="75" width="80" height="30" fill="#2563eb" rx="4"/>
  <text x="507" y="94" font-family="Inter, Arial" font-size="12" fill="#ffffff">搜索</text>
  <rect x="600" y="75" width="80" height="30" fill="#10b981" rx="4"/>
  <text x="607" y="94" font-family="Inter, Arial" font-size="12" fill="#ffffff">导出</text>
  
  <!-- 操作日志表格 -->
  <rect x="20" y="140" width="1400" height="720" fill="#f8fafc" rx="8"/>
  
  <!-- 表格头部 -->
  <rect x="40" y="160" width="1360" height="40" fill="#f1f5f9" rx="4"/>
  <text x="50" y="185" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#1e293b">操作时间</text>
  <text x="250" y="185" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#1e293b">操作类型</text>
  <text x="450" y="185" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#1e293b">操作人</text>
  <text x="650" y="185" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#1e293b">操作对象</text>
  <text x="950" y="185" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#1e293b">IP地址</text>
  <text x="1150" y="185" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#1e293b">状态</text>
  
  <!-- 数据行 -->
  <rect x="40" y="210" width="1360" height="40" fill="#ffffff" rx="4"/>
  <text x="50" y="235" font-family="Inter, Arial" font-size="12" fill="#64748b">2026-03-12 10:30:15</text>
  <text x="250" y="235" font-family="Inter, Arial" font-size="12" fill="#64748b">创建项目</text>
  <text x="450" y="235" font-family="Inter, Arial" font-size="12" fill="#64748b">管理Agent</text>
  <text x="650" y="235" font-family="Inter, Arial" font-size="12" fill="#64748b">项目A</text>
  <text x="950" y="235" font-family="Inter, Arial" font-size="12" fill="#64748b">192.168.1.100</text>
  <rect x="1150" y="220" width="80" height="20" fill="#10b981" rx="4"/>
  <text x="1160" y="233" font-family="Inter, Arial" font-size="10" fill="#ffffff">成功</text>
  
  <rect x="40" y="260" width="1360" height="40" fill="#ffffff" rx="4"/>
  <text x="50" y="285" font-family="Inter, Arial" font-size="12" fill="#64748b">2026-03-12 10:25:30</text>
  <text x="250" y="285" font-family="Inter, Arial" font-size="12" fill="#64748b">任务分配</text>
  <text x="450" y="285" font-family="Inter, Arial" font-size="12" fill="#64748b">产品Agent</text>
  <text x="650" y="285" font-family="Inter, Arial" font-size="12" fill="#64748b">任务X</text>
  <text x="950" y="285" font-family="Inter, Arial" font-size="12" fill="#64748b">192.168.1.101</text>
  <rect x="1150" y="270" width="80" height="20" fill="#10b981" rx="4"/>
  <text x="1160" y="283" font-family="Inter, Arial" font-size="10" fill="#ffffff">成功</text>
  
  <rect x="40" y="310" width="1360" height="40" fill="#ffffff" rx="4"/>
  <text x="50" y="335" font-family="Inter, Arial" font-size="12" fill="#64748b">2026-03-12 10:20:45</text>
  <text x="250" y="335" font-family="Inter, Arial" font-size="12" fill="#64748b">状态变更</text>
  <text x="450" y="335" font-family="Inter, Arial" font-size="12" fill="#64748b">开发Agent</text>
  <text x="650" y="335" font-family="Inter, Arial" font-size="12" fill="#64748b">任务Y</text>
  <text x="950" y="335" font-family="Inter, Arial" font-size="12" fill="#64748b">192.168.1.102</text>
  <rect x="1150" y="320" width="80" height="20" fill="#f59e0b" rx="4"/>
  <text x="1160" y="333" font-family="Inter, Arial" font-size="10" fill="#ffffff">警告</text>
  
  <rect x="40" y="360" width="1360" height="40" fill="#ffffff" rx="4"/>
  <text x="50" y="385" font-family="Inter, Arial" font-size="12" fill="#64748b">2026-03-12 10:15:20</text>
  <text x="250" y="385" font-family="Inter, Arial" font-size="12" fill="#64748b">查询项目</text>
  <text x="450" y="385" font-family="Inter, Arial" font-size="12" fill="#64748b">测试Agent</text>
  <text x="650" y="385" font-family="Inter, Arial" font-size="12" fill="#64748b">项目B</text>
  <text x="950" y="385" font-family="Inter, Arial" font-size="12" fill="#64748b">192.168.1.103</text>
  <rect x="1150" y="370" width="80" height="20" fill="#10b981" rx="4"/>
  <text x="1160" y="383" font-family="Inter, Arial" font-size="10" fill="#ffffff">成功</text>
  
  <!-- 分页 -->
  <rect x="40" y="800" width="1360" height="40" fill="#f1f5f9" rx="4"/>
  <text x="60" y="825" font-family="Inter, Arial" font-size="12" fill="#64748b">显示第1-4项，共35项</text>
  <rect x="650" y="805" width="30" height="28" fill="#2563eb" rx="4"/>
  <text x="657" y="822" font-family="Inter, Arial" font-size="12" fill="#ffffff">1</text>
  <rect x="690" y="805" width="30" height="28" fill="#e2e8f0" rx="4"/>
  <text x="697" y="822" font-family="Inter, Arial" font-size="12" fill="#64748b">2</text>
  <rect x="730" y="805" width="30" height="28" fill="#e2e8f0" rx="4"/>
  <text x="737" y="822" font-family="Inter, Arial" font-size="12" fill="#64748b">3</text>
  <text x="770" y="822" font-family="Inter, Arial" font-size="12" fill="#64748b">...</text>
  <rect x="800" y="805" width="30" height="28" fill="#e2e8f0" rx="4"/>
