  <rect x="810" y="130" width="100" height="32" fill="#52c41a" rx="4"/>
  <text x="820" y="152" fill="white" font-size="14" font-family="system-ui, -apple-system">导出CSV</text>
  
  <!-- Summary Cards -->
  <rect x="232" y="224" width="944" height="80" fill="white" rx="4" stroke="#e8e8e8"/>
  <text x="260" y="270" font-size="16" font-weight="bold" fill="#1890ff" font-family="system-ui, -apple-system">项目数: 8</text>
  <text x="420" y="270" font-size="16" font-weight="bold" fill="#1890ff" font-family="system-ui, -apple-system">任务数: 312</text>
  <text x="580" y="270" font-size="16" font-weight="bold" fill="#1890ff" font-family="system-ui, -apple-system">完成率: 73%</text>
  <text x="740" y="270" font-size="16" font-weight="bold" fill="#1890ff" font-family="system-ui, -apple-system">平均周期: 5.6天</text>
  
  <!-- Agent Table -->
  <rect x="232" y="320" width="944" height="200" fill="white" rx="4" stroke="#e8e8e8"/>
  <text x="248" y="350" font-size="14" font-weight="600" font-family="system-ui, -apple-system">Agent 完成情况统计</text>
  <!-- Table Header -->
  <rect x="248" y="360" width="896" height="36" fill="#fafafa" rx="2"/>
  <text x="258" y="383" font-size="13" font-weight="600" font-family="system-ui, -apple-system">Agent</text>
  <text x="380" y="383" font-size="13" font-weight="600" font-family="system-ui, -apple-system">总任务</text>
  <text x="480" y="383" font-size="13" font-weight="600" font-family="system-ui, -apple-system">已完成</text>
  <text x="580" y="383" font-size="13" font-weight="600" font-family="system-ui, -apple-system">完成率</text>
  <text x="680" y="383" font-size="13" font-weight="600" font-family="system-ui, -apple-system">平均耗时</text>
  
  <!-- Project Table -->
  <rect x="232" y="536" width="944" height="180" fill="white" rx="4" stroke="#e8e8e8"/>
  <text x="248" y="566" font-size="14" font-weight="600" font-family="system-ui, -apple-system">项目完成情况统计</text>
  
  <!-- Footer -->
  <text x="232" y="780" font-size="12" fill="#8c8c8c" font-family="system-ui, -apple-system">
