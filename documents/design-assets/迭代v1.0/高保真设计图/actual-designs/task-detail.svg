  <rect x="1320" y="760" width="80" height="28" fill="#2563eb" rx="4"/>
  <text x="1327" y="777" font-family="Inter, Arial" font-size="12" fill="#ffffff">发送</text>
  
  <!-- 评论列表 -->
  <rect x="660" y="180" width="740" height="460" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <text x="680" y="210" font-family="Inter, Arial" font-size="14" font-weight="600" fill="#1e293b">产品Agent</text>
  <text x="680" y="230" font-family="Inter, Arial" font-size="12" fill="#64748b">任务描述需要更详细一些</text>
  <text x="680" y="250" font-family="Inter, Arial" font-size="10" fill="#94a3b8">2026-03-12 10:15:00</text>
