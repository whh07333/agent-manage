  <rect x="480" y="130" width="200" height="32" fill="white" stroke="#d9d9d9" rx="4"/>
  <text x="490" y="152" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">2026-03-17</text>
  
  <text x="248" y="190" font-size="14" font-family="system-ui, -apple-system">Agent 筛选</text>
  <rect x="320" y="175" width="360" height="32" fill="white" stroke="#d9d9d9" rx="4"/>
