  <rect x="120" y="75" width="120" height="30" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
  <text x="130" y="94" font-family="Inter, Arial" font-size="12" fill="#64748b">近30天</text>
  <rect x="260" y="75" width="80" height="30" fill="#2563eb" rx="4"/>
