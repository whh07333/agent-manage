<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎤 网页会议录音器</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      width: 450px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 600px;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .header-icon {
      font-size: 28px;
      background: rgba(255, 255, 255, 0.2);
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    
    .header-subtitle {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 4px;
    }
    
    .status-card {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    
    .status-label {
      font-size: 14px;
      opacity: 0.9;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-value {
      font-size: 16px;
      font-weight: 600;
    }
    
    .status-recording {
      color: #ff4757;
      animation: pulse 2s infinite;
    }
    
    .status-paused {
      color: #ffa502;
    }
    
    .status-ready {
      color: #2ed573;
    }
    
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    
    .audio-visualizer {
      background: rgba(0, 0, 0, 0.3);
      height: 80px;
      border-radius: 8px;
      margin: 20px 0;
      overflow: hidden;
      position: relative;
    }
    
    .waveform {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    .speaker-display {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }
    
    .speaker-badge {
      background: rgba(255, 255, 255, 0.2);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .speaker-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    
    .control-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 25px 0;
    }
    
    .btn {
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #ff6b6b, #ee5a52);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .transcription-panel {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .transcription-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .transcription-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    
    .speaker-tag {
      display: inline-block;
      background: rgba(102, 126, 234, 0.3);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
    }
    
    .transcription-text {
      font-size: 14px;
      line-height: 1.5;
      margin-top: 6px;
    }
    
    .timestamp {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
    }
    
    .progress-container {
      margin: 20px 0;
    }
    
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .progress-bar {
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00b09b, #96c93d);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    .settings-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      transition: background 0.3s ease;
    }
    
    .settings-link:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .recording-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: rgba(255, 71, 87, 0.2);
      border-radius: 8px;
      margin-bottom: 15px;
    }
    
    .recording-dot {
      width: 12px;
      height: 12px;
      background: #ff4757;
      border-radius: 50%;
      animation: blink 1.5s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .file-size {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }
    
    .quality-badge {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(46, 213, 115, 0.3);
      border-radius: 4px;
      font-size: 11px;
      margin-left: 8px;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      opacity: 0.7;
    }
    
    .empty-icon {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.5;
    }
    
    .empty-text {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div class="header-icon">🎤</div>
      <div>
        <div class="header-title">网页会议录音器</div>
        <div class="header-subtitle">AI智能分析 • 说话人区分 • 自动纪要</div>
      </div>
    </div>
    
    <!-- 状态卡片 -->
    <div class="status-card">
      <div class="status-row">
        <div class="status-label">
          <span>📊</span> 录音状态
        </div>
        <div id="recordingStatus" class="status-value status-ready">就绪</div>
      </div>
      
      <div class="status-row">
        <div class="status-label">
          <span>⏱️</span> 录制时长
        </div>
        <div id="recordingTime" class="status-value">00:00:00</div>
      </div>
      
      <div class="status-row">
        <div class="status-label">
          <span>👥</span> 检测到说话人
        </div>
        <div id="speakerCount" class="status-value">0 人</div>
      </div>
      
      <div class="status-row">
        <div class="status-label">
          <span>💾</span> 文件大小
        </div>
        <div id="fileSize" class="status-value">0 MB</div>
      </div>
    </div>
    
    <!-- 录音指示器 -->
    <div id="recordingIndicator" class="recording-indicator" style="display: none;">
      <div class="recording-dot"></div>
      <div>正在录音中...</div>
    </div>
    
    <!-- 音频可视化 -->
    <div class="audio-visualizer">
      <canvas id="waveformCanvas" class="waveform"></canvas>
    </div>
    
    <!-- 说话人显示 -->
    <div class="speaker-display" id="speakerDisplay">
      <div class="empty-text">等待检测说话人...</div>
    </div>
    
    <!-- 控制按钮 -->
    <div class="control-buttons">
      <button id="startBtn" class="btn btn-primary">
        <span>🔴</span> 开始录音
      </button>
      
      <button id="pauseBtn" class="btn btn-secondary" disabled>
        <span>⏸️</span> 暂停
      </button>
      
      <button id="stopBtn" class="btn btn-secondary" disabled>
        <span>⏹️</span> 停止录音
      </button>
      
      <button id="analyzeBtn" class="btn btn-primary" disabled>
        <span>🤖</span> AI分析
      </button>
    </div>
    
    <!-- 进度条 -->
    <div class="progress-container">
      <div class="progress-label">
        <span>分析进度</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
      </div>
    </div>
    
    <!-- 实时转文字 -->
    <div class="transcription-panel">
      <div class="panel-title">
        <span>📝</span> 实时转文字
      </div>
      <div id="transcriptionList" class="transcription-list">
        <div class="empty-state">
          <div class="empty-icon">🎯</div>
          <div class="empty-text">开始录音后，将显示实时转文字结果</div>
        </div>
      </div>
    </div>
    
    <!-- 设置链接 -->
    <a href="#" id="settingsBtn" class="settings-link">
      <span>⚙️</span> 打开设置
    </a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
