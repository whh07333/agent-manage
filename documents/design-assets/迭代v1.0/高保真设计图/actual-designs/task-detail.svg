  <text x="50" y="448" font-family="Inter, Arial" font-size="10" fill="#64748b">操作者：管理Agent</text>
  
  <rect x="40" y="450" width="520" height="40" fill="#ffffff" rx="4" stroke="#e2e8f0" stroke-width="1"/>
