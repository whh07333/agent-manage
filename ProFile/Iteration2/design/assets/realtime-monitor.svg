<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f0f2f5"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="64" fill="#001529"/>
  <text x="24" y="36" fill="white" font-size="20" font-family="system-ui, -apple-system">实时监控看板</text>
  <rect x="1050" y="16" width="80" height="32" fill="transparent" stroke="#1890ff" rx="4"/>
  <text x="1065" y="38" fill="#1890ff" font-size="14" font-family="system-ui, -apple-system">刷新</text>
  
  <!-- Sidebar -->
  <rect x="0" y="64" width="208" height="736" fill="#002140"/>
  
  <!-- Main Content -->
  <rect x="208" y="64" width="992" height="736" fill="#f0f2f5"/>
  
  <!-- Request Area - Normal -->
  <rect x="232" y="88" width="460" height="180" fill="white" rx="4" stroke="#e8e8e8"/>
  <text x="248" y="120" font-size="16" font-weight="600" font-family="system-ui, -apple-system">请求统计 (24小时)</text>
  <text x="248" y="150" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">总请求量: <tspan fill="#1890ff" font-weight="bold">15,234</tspan></text>
  <text x="248" y="175" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">QPS 峰值: <tspan fill="#1890ff" font-weight="bold">128</tspan></text>
  <text x="248" y="200" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">错误率: <tspan fill="#52c41a" font-weight="bold">1.2% < 5%</tspan></text>
  <text x="248" y="225" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">平均响应: <tspan fill="#1890ff" font-weight="bold">186ms</tspan></text>
  
  <!-- Event Area -->
  <rect x="708" y="88" width="460" height="180" fill="white" rx="4" stroke="#e8e8e8"/>
  <text x="724" y="120" font-size="16" font-weight="600" font-family="system-ui, -apple-system">事件推送</text>
  <text x="724" y="150" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">总事件数: <tspan fill="#1890ff" font-weight="bold">8,456</tspan></text>
  <text x="724" y="175" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">成功率: <tspan fill="#52c41a" font-weight="bold">98.5%</tspan></text>
  <text x="724" y="200" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">待重试: <tspan fill="#faad14" font-weight="bold">12</tspan></text>
  <text x="724" y="225" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">死信: <tspan fill="#faad14" font-weight="bold">3</tspan></text>
  
  <!-- System Area - Warning -->
  <rect x="232" y="288" width="460" height="180" fill="#fffbe6" rx="4" stroke="#faad14"/>
  <text x="248" y="320" font-size="16" font-weight="600" fill="#faad14" font-family="system-ui, -apple-system">系统资源 ⚠️</text>
  <text x="248" y="350" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">CPU使用率: <tspan fill="#faad14" font-weight="bold">83% > 80%</tspan></text>
  <text x="248" y="375" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">内存使用率: <tspan fill="#1890ff" font-weight="bold">67%</tspan></text>
  <text x="248" y="400" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">系统负载: <tspan fill="#1890ff" font-weight="bold">1.25</tspan></text>
  
  <!-- Database Area -->
  <rect x="708" y="288" width="460" height="180" fill="white" rx="4" stroke="#e8e8e8"/>
  <text x="724" y="320" font-size="16" font-weight="600" font-family="system-ui, -apple-system">数据库</text>
  <text x="724" y="350" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">活跃连接: <tspan fill="#1890ff" font-weight="bold">18</tspan></text>
  <text x="724" y="375" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">平均查询时间: <tspan fill="#1890ff" font-weight="bold">48ms</tspan></text>
  <text x="724" y="400" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">慢查询数: <tspan fill="#faad14" font-weight="bold">12 > 10</tspan></text>
  
  <!-- Last updated -->
  <text x="232" y="760" font-size="14" fill="#8c8c8c" font-family="system-ui, -apple-system">数据更新于: 2026-03-18 02:05:34 · 自动刷新每 30 秒</text>
  
  <!-- Footer -->
  <text x="232" y="790" font-size="12" fill="#8c8c8c" font-family="system-ui, -apple-system">
  设计：Tina · 迭代2 · 实时监控看板 · 数据延迟 ≤ 1秒
  </text>
</svg>
