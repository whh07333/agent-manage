<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <rect width="1440" height="900" fill="#ffffff" />
  <text x="20" y="40" font-family="Inter, Arial" font-size="28" font-weight="700" fill="#1e293b">OpenClaw AI项目管理系统 - 审计日志</text>
  
  <!-- 操作栏 -->
  <rect x="20" y="60" width="1400" height="60" fill="#f8fafc" rx="6"/>
